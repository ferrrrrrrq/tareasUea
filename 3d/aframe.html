<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3d</title>
     <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

    
</head>
<body>
    <a-scene>
    <a-assets>
    <a-asset-item id="monkey" src="assets/mono.glb"></a-asset-item>
    </a-assets>

     <a-entity gltf-model="#monkey" position="1 1 -3"></a-entity>

    <a-box position="-1 0.5 -3" rotation="0 45 0" color="#388B0B"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#0B378B"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#8B0B38"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#63439D"></a-plane>
      <a-sky color="#5C5C5C"></a-sky>
   </a-scene>
</body>
</html>
